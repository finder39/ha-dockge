start_stack:
  name: Start Stack
  description: Start a Docker Compose stack
  fields:
    stack_name:
      name: Stack Name
      description: Name of the stack to start
      required: true
      selector:
        text:
    agent:
      name: Agent
      description: Agent name, e.g. "Gastly" (leave empty for primary server)
      default: ""
      selector:
        text:

